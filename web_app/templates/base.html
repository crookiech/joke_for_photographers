<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
    <div class="container d-flex flex-column flex-md-row align-items-center p-3 px-md-4 mb-3 bg-white border-bottom">
        <h5 class="my-0 mr-md-auto font-weight-normal">Web-приложение для фотографов</h5>
        <nav class="d-inline-flex ms-md-auto gap-2">
            <a class="p-2 text-dark" href="/">Главная</a>
            <a class="p-2 text-dark btn btn-warning" href="/create">Создать</a>
        </nav>
    </div>
    <div class="content-center">
        <div class="container mt-5">
            {% block body %}{% endblock %}
        </div>
    </div>
    <footer class="container pt-4 my-md-5 pt-md-5 border-top">
        <div class="row">
            <div class="col-12 col-md">
                <small class="d-block mb-3 text-body-secondary">© 2026</small>
            </div>
            <div class="col-6 col-md">
                <h5>Ресурсы</h5>
                <ul class="list-unstyled text-small">
                    <li class="mb-1">
                        <a class="link-secondary text-decoration-none" href="https://github.com/crookiech/joke_for_photographers">GitHub</a>
                    </li>
                </ul>
            </div>
            <div class="col-6 col-md">
                <h5>Команда</h5>
                <ul class="list-unstyled text-small">
                    <li class="mb-1">
                        <a class="link-secondary text-decoration-none" href="#">Научный руководитель</a>
                    </li>
                    <li class="mb-1">
                        <a class="link-secondary text-decoration-none" href="#">Разработчик</a>
                    </li>
                </ul>
            </div>
        </div>
    </footer>
</body>
</html>
