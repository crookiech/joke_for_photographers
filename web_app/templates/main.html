{% extends 'base.html' %}

{% block title %}
	Главная страница
{% endblock %}

{% block body %}
	<style>
		.card_style {
			height: 200px;
			object-fit: cover;
		}
		.title_style {
			display: -webkit-box;
			-webkit-line-clamp: 2;
			-webkit-box-orient: vertical;
			overflow: hidden;
			line-clamp: 2;
		}
		.text_style {
			display: -webkit-box;
			-webkit-line-clamp: 3;
			-webkit-box-orient: vertical;
			overflow: hidden;
			line-clamp: 3;
		}
	</style>
	<div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
		{% for element in articles %}
		<div class="col">
			<a href="/main/{{ element.id }}" class="text-decoration-none text-dark">
				<div class="card" style="min-height: 300px;">
					<img src="{{ url_for('static', filename='images/forest.jpg') }}" class="card-img-top" alt="Изображение поста">
					<div class="card-body">
						<h5 class="card-title title_style">{{ element.title }}</h5>
						<p class="card-text text_style">{{ element.intro }}</p>
						<p class="card-text mt-auto"><small class="text-muted">Дата: {{ element.date.date() }}</small></p>
					</div>
				</div>
			</a>
		</div>
		{% endfor %}
	</div>
{% endblock %}
